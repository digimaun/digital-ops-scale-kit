# Base site template for IoT Operations deployments
# All sites inherit from this to get consistent defaults

apiVersion: siteops/v1
kind: SiteTemplate
name: base-site

labels:
  managedBy: siteops

properties:
  # AIO version (release moniker) - determines extension versions
  # See: parameters/aio-versions/ for available versions
  aioVersion: "2603"

  # Deployment options - control which components are deployed
  deployOptions:
    includeGlobalSite: false      # Subscription-scoped edge site
    includeEdgeSite: false        # RG-scoped edge site
    includeSolution: false
    includeOpcPlcSimulator: false
    enableSecretSync: false

parameters:
  # AIO broker configuration defaults
  brokerConfig:
    memoryProfile: Medium
  # Default dataflow instance count
  defaultDataflowInstanceCount: 1
