# Munich Development Site

apiVersion: siteops/v1
kind: Site
name: munich-dev
inherits: base-site.yaml

subscription: "00000000-0000-0000-0000-000000000000"
resourceGroup: rg-iot-munich-dev
location: germanywestcentral

labels:
  environment: dev
  country: DE
  city: Munich

properties:
  deployOptions:
    includeSolution: true
    includeOpcPlcSimulator: true

parameters:
  clusterName: munich-dev-arc
  brokerConfig:
    frontendReplicas: 1
    frontendWorkers: 1
    backendRedundancyFactor: 2
    backendWorkers: 1
    backendPartitions: 1
    memoryProfile: Low
  defaultDataflowInstanceCount: 1
