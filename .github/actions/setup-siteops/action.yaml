name: "Setup Site Ops"
description: "Install Python and Site Ops"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  install-dev:
    description: "Include dev dependencies (pytest, pytest-cov)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-siteops-${{ inputs.install-dev == 'true' && 'dev-' || '' }}${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-siteops-
          ${{ runner.os }}-pip-

    - name: Install Site Ops
      shell: bash
      env:
        INSTALL_DEV: ${{ inputs.install-dev }}
      run: |
        pip install --upgrade pip
        if [[ "$INSTALL_DEV" == "true" ]]; then
          pip install -e ".[dev]"
        else
          pip install -e .
        fi

    - name: Verify Site Ops installation
      shell: bash
      run: siteops --version
