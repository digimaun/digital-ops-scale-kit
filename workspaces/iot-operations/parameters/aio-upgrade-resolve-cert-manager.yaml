# Fan-in inputs into the resolve-cert-manager step of aio-upgrade.yaml. See
# docs/parameter-resolution.md for the *-chaining.yaml convention.
# Consumed by: resolve-cert-manager (in aio-upgrade.yaml)

# Cluster identity for the cert-manager extension lookup (cert-manager is
# scoped at the connected cluster, not the AIO custom location).
connectedClusterName: "{{ steps.resolve-aio.outputs.connectedClusterName }}"

# Trust source detected from the AIO extension's configurationSettings drives
# whether cert-manager is resolved.
trustSource: "{{ steps.resolve-extensions.outputs.detectedTrustSource }}"
