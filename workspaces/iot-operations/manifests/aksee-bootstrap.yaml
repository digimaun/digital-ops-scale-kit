apiVersion: siteops/v1
kind: Manifest
name: aksee-bootstrap
description: |
  Bootstraps a bare Arc-onboarded Windows VM through AKS Edge Essentials
  install, single-node K3s cluster, Arc-connected cluster with custom
  locations enabled, ready for the AIO deploy chain. Delivered via Arc Run
  Command. Survives the Hyper-V reboot via a Scheduled Task and `state.json`.
  Per-phase idempotent.

  Use this manifest standalone to bootstrap hosts on its own. To compose
  bootstrap + AIO install in a single deploy, see
  `samples/aio-with-aksee-bootstrap/manifest.yaml`.

  Prerequisites per target VM (one-time):
    - Server is Arc-connected (e.g., via `OnboardingScript.ps1`).
    - The `spAppId` service principal needs resource-group access for the
      Phase 2 cluster create plus, on the standard path, the Phase 3 Arc
      operations and tag write. Use `Contributor`, or `Kubernetes Cluster -
      Azure Arc Onboarding` plus `Tag Contributor` for least privilege.
    - On the no-SP fallback (existing cluster), the Arc machine identity runs
      Phase 3 and the tag write instead. Unused on the standard path.

# Max concurrent sites. 0 = unlimited, 1 = serial.
parallel: 3

# Default selector. Override at the CLI with `-l <key>=<value>`.
selector: "environment=dev"

steps:
  - include: ../templates/host-bootstrap/aksee/_partial.yaml
