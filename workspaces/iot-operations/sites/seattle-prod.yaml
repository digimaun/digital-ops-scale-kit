# Seattle Production Site

apiVersion: siteops/v1
kind: Site
name: seattle-prod
inherits: base-site.yaml

subscription: "00000000-0000-0000-0000-000000000000"
resourceGroup: rg-iot-seattle-prod
location: westus

labels:
  environment: prod
  country: US
  city: Seattle

properties:
  deployOptions:
    includeSolution: true
    includeOpcPlcSimulator: false

parameters:
  clusterName: seattle-prod-arc
  brokerConfig:
    frontendReplicas: 4
    frontendWorkers: 2
    backendRedundancyFactor: 2
    backendWorkers: 4
    backendPartitions: 2
    memoryProfile: Medium
  defaultDataflowInstanceCount: 1
