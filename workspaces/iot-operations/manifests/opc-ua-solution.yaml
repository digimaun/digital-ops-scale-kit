apiVersion: siteops/v1
kind: Manifest
name: opc-ua-solution
description: |
  Deploy OPC UA solution to an existing Azure IoT Operations instance.
  Creates an OPC UA asset, Event Hub destination, and data transformation pipeline.

  Prerequisites:
    - AIO instance deployed (via aio-install.yaml or AIO CLI)
    - Sites must have existing AIO resources:
      - AIO Instance: {{ site.name }}-aio
      - ADR Namespace: {{ site.name }}-ns
      - Custom Location: {{ site.name }}-cl

parallel: 3

# Site selection via CLI: siteops deploy ... -l "environment=staging"
# Or uncomment one of the options below:
#
# Option 1: Explicit site list
# sites:
#   - chicago-staging
#
# Option 2: Label selector (override with -l flag)
siteSelector: "environment=dev"

parameters:
  - parameters/common.yaml

steps:
  # Deploy OPC UA solution (asset, Event Hub, dataflow)
  - name: opc-ua-solution
    template: templates/iot-ops/solutions/opc-ua-solution.bicep
    scope: resourceGroup

  # Deploy OPC PLC simulator (conditional, dev only)
  - name: opc-plc-simulator
    type: kubectl
    operation: apply
    arc:
      name: "{{ site.parameters.clusterName }}"
      resourceGroup: "{{ site.resourceGroup }}"
    files:
      - https://raw.githubusercontent.com/Azure-Samples/explore-iot-operations/main/samples/quickstarts/opc-plc-deployment.yaml
    when: "{{ site.properties.deployOptions.includeOpcPlcSimulator }}"
