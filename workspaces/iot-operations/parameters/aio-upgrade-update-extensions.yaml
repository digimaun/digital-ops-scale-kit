# Fan-in inputs into the update-extensions step of aio-upgrade.yaml. See
# docs/parameter-resolution.md for the *-chaining.yaml convention.
# Consumed by: update-extensions (in aio-upgrade.yaml)

# Cluster identity for the extension PUTs (each extension is scoped at the
# connected cluster).
connectedClusterName: "{{ steps.resolve-aio.outputs.connectedClusterName }}"

# Resolved extension snapshots + cert-manager presence flag.
aio: "{{ steps.resolve-extensions.outputs.aio }}"
secretStore: "{{ steps.resolve-extensions.outputs.secretStore }}"
certManager: "{{ steps.resolve-cert-manager.outputs.snapshot }}"
certManagerPresent: "{{ steps.resolve-cert-manager.outputs.present }}"
