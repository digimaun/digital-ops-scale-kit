name: "Setup Site Ops"
description: "Install Python and Site Ops (local or from repository)"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  install-dev:
    description: "Install from local directory with dev dependencies (for siteops repo only)"
    required: false
    default: "false"
  siteops-pat:
    description: "Fine-grained PAT for Site Ops repo (Contents: read). Required if install-dev is false."
    required: false
  siteops-repo:
    description: "Site Ops repository (owner/repo)"
    required: false
    default: "digimaun/siteops"
  siteops-ref:
    description: "Site Ops git ref (branch, tag, or commit)"
    required: false
    default: "main"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-siteops-${{ inputs.install-dev == 'true' && 'local' || inputs.siteops-ref }}
        restore-keys: |
          ${{ runner.os }}-pip-siteops-
          ${{ runner.os }}-pip-

    - name: Install Site Ops (local with dev dependencies)
      if: inputs.install-dev == 'true'
      shell: bash
      run: |
        pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Install Site Ops (from remote repo)
      if: inputs.install-dev != 'true'
      shell: bash
      env:
        SITEOPS_PAT: ${{ inputs.siteops-pat }}
        SITEOPS_REPO: ${{ inputs.siteops-repo }}
        SITEOPS_REF: ${{ inputs.siteops-ref }}
      run: |
        if [[ -z "$SITEOPS_PAT" ]]; then
          echo "::error::siteops-pat is required when install-dev is false"
          exit 1
        fi
        pip install --upgrade pip
        pip install "git+https://${SITEOPS_PAT}@github.com/${SITEOPS_REPO}.git@${SITEOPS_REF}"

    - name: Verify Site Ops installation
      shell: bash
      run: siteops --version
