# Reusable workflow for Site Ops deployments
# Called by deploy.yaml with specific parameters

name: _Site Ops Deploy

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        required: false
        type: string
        default: ""
      workspace:
        description: "Workspace directory"
        required: false
        type: string
        default: "workspaces/iot-operations"
      manifest:
        description: "Path to manifest file (relative to workspace)"
        required: true
        type: string
      environment:
        description: "GitHub environment for protection rules"
        required: false
        type: string
        default: ""
      selector:
        description: "Site selector (e.g., environment=prod)"
        required: false
        type: string
        default: ""
      dry-run:
        description: "Dry run mode (no actual deployment)"
        required: false
        type: boolean
        default: false
      siteops-source:
        description: "siteops install source (empty = local editable install)"
        required: false
        type: string
        default: ""
    secrets:
      AZURE_CLIENT_ID:
        description: "Azure AD application client ID"
        required: true
      AZURE_TENANT_ID:
        description: "Azure AD tenant ID"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Azure subscription ID (for OIDC)"
        required: true
      SITE_OVERRIDES:
        description: "JSON object with site overrides"
        required: false

env:
  PYTHONUNBUFFERED: "1"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || null }}

    permissions:
      id-token: write
      contents: read

    env:
      INPUT_WORKSPACE: ${{ inputs.workspace }}
      INPUT_MANIFEST: ${{ inputs.manifest }}
      INPUT_SELECTOR: ${{ inputs.selector }}
      INPUT_DRY_RUN: ${{ inputs.dry-run }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Setup Site Ops
        uses: ./.github/actions/setup-siteops
        with:
          siteops-source: ${{ inputs.siteops-source }}

      - name: Validate inputs
        shell: bash
        run: |
          # Prevent path traversal attacks
          if [[ "$INPUT_WORKSPACE" == *".."* ]] || [[ "$INPUT_MANIFEST" == *".."* ]]; then
            echo "::error::Path traversal not allowed"
            exit 1
          fi

          if [[ -n "$INPUT_SELECTOR" && ! "$INPUT_SELECTOR" =~ ^[a-zA-Z0-9_=,./:-]+$ ]]; then
            echo "::error::Invalid selector format"
            exit 1
          fi

          if [[ ! -d "$INPUT_WORKSPACE" ]]; then
            echo "::error::Workspace directory not found: $INPUT_WORKSPACE"
            exit 1
          fi

          echo "✓ Inputs validated"

      - name: Setup site overrides
        env:
          SITE_OVERRIDES: ${{ secrets.SITE_OVERRIDES }}
        shell: bash
        run: |
          # Generate sites.local/ override files from SITE_OVERRIDES JSON secret.
          # Supports nested paths using dot notation for parameters:
          # {
          #   "munich-dev": {
          #     "subscription": "...",
          #     "resourceGroup": "...",
          #     "parameters.clusterName": "actual-cluster-name",
          #     "parameters.customLocationName": "actual-custom-location"
          #   }
          # }

          if [[ -z "$SITE_OVERRIDES" ]]; then
            echo "No site overrides configured, using committed sites"
            exit 0
          fi

          if ! echo "$SITE_OVERRIDES" | jq empty 2>/dev/null; then
            echo "::error::SITE_OVERRIDES secret is not valid JSON"
            exit 1
          fi

          mkdir -p "$INPUT_WORKSPACE/sites.local"

          for site_name in $(echo "$SITE_OVERRIDES" | jq -r 'keys[]'); do
            # Sanitize site name - only allow alphanumeric, dash, underscore
            if [[ ! "$site_name" =~ ^[a-zA-Z0-9_-]+$ ]]; then
              echo "::error::Invalid site name in SITE_OVERRIDES: $site_name"
              exit 1
            fi

            output_file="$INPUT_WORKSPACE/sites.local/${site_name}.yaml"
            
            # Build the YAML file with proper nesting
            # First, collect all entries and group by parent
            {
              # Write top-level keys first
              echo "$SITE_OVERRIDES" | jq -r --arg site "$site_name" \
                '.[$site] | to_entries[] | select(.key | contains(".") | not) | "\(.key): \"\(.value)\""'
              
              # Then write nested keys grouped by parent
              for parent in $(echo "$SITE_OVERRIDES" | jq -r --arg site "$site_name" \
                '.[$site] | keys[] | select(contains(".")) | split(".")[0]' | sort -u); do
                echo "${parent}:"
                echo "$SITE_OVERRIDES" | jq -r --arg site "$site_name" --arg parent "$parent" \
                  '.[$site] | to_entries[] | select(.key | startswith($parent + ".")) | "  \(.key | split(".")[1]): \"\(.value)\""'
              done
            } > "$output_file"

            echo "✓ Generated override for: $site_name"
          done

          # Register each override value with GitHub's log masking so
          # subscription IDs, resource groups, etc. appear as *** in all
          # subsequent step output (logs, summaries, artifacts).
          echo "$SITE_OVERRIDES" | jq -r '.. | strings' | while IFS= read -r val; do
            [[ -n "$val" ]] && echo "::add-mask::${val}"
          done

          count=$(ls "$INPUT_WORKSPACE/sites.local/"*.yaml 2>/dev/null | wc -l)
          echo "✓ Generated ${count} site override(s)"

      - name: Validate and show target sites
        shell: bash
        run: |
          # Use validate -v instead of sites — it shows only site names and
          # locations, not subscription IDs, resource groups, or parameters
          # which may contain sensitive values from SITE_OVERRIDES.
          CMD_ARGS=(-w "$INPUT_WORKSPACE" validate "$INPUT_MANIFEST")
          [[ -n "$INPUT_SELECTOR" ]] && CMD_ARGS+=(-l "$INPUT_SELECTOR")
          CMD_ARGS+=(-v)

          echo "### Deployment Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          siteops "${CMD_ARGS[@]}" 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Start OIDC token refresh service
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          # Background service that refreshes OIDC token every 4 minutes.
          # GitHub OIDC tokens expire after ~5 minutes, so this keeps az cli
          # authenticated for long-running AIO deployments (which can take 20+ min).
          (
            while true; do
              sleep 240
              token=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq -r .value)
              az login --service-principal -u "$AZURE_CLIENT_ID" -t "$AZURE_TENANT_ID" \
                --federated-token "$token" --output none 2>/dev/null || true
            done
          ) &
          echo "OIDC token refresh service started (PID: $!)"

      - name: Deploy
        id: deploy
        shell: bash
        run: |
          START_TIME=$(date +%s)

          CMD_ARGS=(-w "$INPUT_WORKSPACE" deploy "$INPUT_MANIFEST")

          if [[ "$INPUT_DRY_RUN" == "true" ]]; then
            CMD_ARGS+=(--dry-run)
            echo "::notice::Running in DRY-RUN mode - no actual deployment"
          fi

          [[ -n "$INPUT_SELECTOR" ]] && CMD_ARGS+=(-l "$INPUT_SELECTOR")

          echo "Executing: siteops ${CMD_ARGS[*]}"
          if siteops "${CMD_ARGS[@]}" 2>&1; then
            DEPLOY_EXIT_CODE=0
          else
            DEPLOY_EXIT_CODE=$?
          fi

          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Result" >> $GITHUB_STEP_SUMMARY
          if [[ $DEPLOY_EXIT_CODE -eq 0 ]]; then
            echo "✅ **Success** in ${DURATION}s" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Failed** after ${DURATION}s" >> $GITHUB_STEP_SUMMARY
          fi

          exit $DEPLOY_EXIT_CODE

      - name: Azure Logout
        if: always()
        shell: bash
        run: az logout || true
