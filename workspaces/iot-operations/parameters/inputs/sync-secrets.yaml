# Inputs to the sync-secrets step. Chains the resolve-aio and secretsync
# upstream steps for infrastructure references, declares the array of
# secrets to manage, and supplies their values via a separate secure
# object so the metadata can live in source while values come from a
# `sites.local/` overlay or CI/CD secret store.
# See docs/parameter-resolution.md for the inputs/outputs convention.
# Consumed by: sync-secrets (in samples/secretsync-sample/manifest.yaml)

# Resolved infrastructure
keyVaultName: "{{ steps.secretsync.outputs.keyVaultName }}"
spcName: "{{ steps.secretsync.outputs.spcResourceName }}"
managedIdentityClientId: "{{ steps.secretsync.outputs.managedIdentityClientId }}"
customLocationName: "{{ steps.resolve-aio.outputs.customLocationName }}"
instanceLocation: "{{ steps.resolve-aio.outputs.instanceLocation }}"

# Per-secret metadata. The `secretName` is the Key Vault secret name and is
# also the default Kubernetes Secret name and key. Override
# `kubernetesSecretName` and `kubernetesSecretKey` per entry when a consuming
# workload needs a specific Secret name or key. Set `createInKv: false` to
# sync a secret that already exists in the Key Vault.
secrets:
  - secretName: secretsync-sample-secret-a
  - secretName: secretsync-sample-secret-b
    kubernetesSecretName: secretsync-sample-app-b
    kubernetesSecretKey: token

# Secret values keyed by `secretName`. For real deployments, supply via a
# `sites.local/` overlay or a CI/CD secret. Do not commit real values.
secretValues:
  secretsync-sample-secret-a: "secretsync-sample-value-a"
  secretsync-sample-secret-b: "secretsync-sample-value-b"
