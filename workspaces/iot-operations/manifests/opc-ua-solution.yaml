apiVersion: siteops/v1
kind: Manifest
name: opc-ua-solution
description: |
  Deploy a sample OPC UA solution layered onto an existing Azure IoT Operations
  instance. Creates an OPC UA device + asset, an Event Hub destination with a
  managed-identity role assignment, and a dataflow that maps oven telemetry
  from the broker to the Event Hub.

  Discovers actual deployed names (custom location, ADR namespace) from the AIO
  instance via resolve-aio, so the manifest works against any AIO install
  including those whose resource names diverge from the default
  `<site>-aio` / `<site>-cl` / `<site>-ns` conventions.

  Prerequisites:
    - AIO instance must be deployed and running (via aio-install.yaml or AIO CLI)
    - The site's aioRelease must point to a parameters/aio-versions/<ver>.yaml file

# Max concurrent sites. 0 = unlimited, 1 = serial.
parallel: 3

# Default selector; override at the CLI with `-l <key>=<value>`.
siteSelector: "environment=dev"

parameters:
  - parameters/common.yaml
  - "parameters/aio-versions/{{ site.properties.aioRelease }}.yaml"

steps:
  - name: resolve-aio
    template: templates/aio/resolve-aio.bicep
    scope: resourceGroup

  - name: opc-ua-solution
    template: templates/solutions/opc-ua-solution.bicep
    scope: resourceGroup
    parameters:
      - parameters/opc-ua-solution-chaining.yaml

  # Conditional on deployOptions.includeOpcPlcSimulator.
  - name: opc-plc-simulator
    type: kubectl
    operation: apply
    arc:
      name: "{{ site.parameters.clusterName }}"
      resourceGroup: "{{ site.resourceGroup }}"
    files:
      - https://raw.githubusercontent.com/Azure-Samples/explore-iot-operations/0072eb6cdd3602bbd48858f21cf097e36a6b0b7e/samples/quickstarts/opc-plc-deployment.yaml
    when: "{{ site.properties.deployOptions.includeOpcPlcSimulator }}"
