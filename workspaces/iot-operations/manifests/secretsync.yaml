apiVersion: siteops/v1
kind: Manifest
name: secretsync
description: |
  Enable secret sync on existing Azure IoT Operations instances.

  This is a standalone manifest for day-2 enablement. For new deployments,
  use aio-install.yaml with deployOptions.enableSecretSync = true.

  Prerequisites:
    - AIO instance must be deployed and running
    - Connected cluster must have OIDC issuer and workload identity enabled

parallel: 3

siteSelector: "environment=dev"

parameters:
  - parameters/common.yaml

steps:
  - name: resolve-aio
    template: templates/iot-ops/common/resolve-aio.bicep
    scope: resourceGroup

  - name: secretsync
    template: templates/iot-ops/secretsync/enable-secretsync.bicep
    scope: resourceGroup
    parameters:
      - parameters/secretsync-chaining.yaml
